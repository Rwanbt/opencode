name: typecheck

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Stub generated models snapshot
        # src/provider/models.ts statically imports ./models-snapshot.js, which is
        # gitignored and normally produced by `bun run build` (script/build.ts) from
        # a live fetch of models.dev. At runtime the import is wrapped in a
        # .catch(), so its absence never breaks tests — but `tsgo --noEmit` still
        # needs the module to resolve. A previous run on a persistent Blacksmith
        # runner had left this file on disk, silently masking the fact that a
        # clean checkout never generates it before typecheck. Content doesn't
        # matter for typechecking, only the shape.
        run: |
          mkdir -p packages/opencode/src/provider
          printf '// @ts-nocheck\n// CI stub for typecheck only - see script/build.ts for the real generator\nexport const snapshot = {}\n' > packages/opencode/src/provider/models-snapshot.js
          printf '// CI stub for typecheck only - see script/build.ts for the real generator\nexport declare const snapshot: Record<string, unknown>\n' > packages/opencode/src/provider/models-snapshot.d.ts

      - name: Run typecheck
        run: bun typecheck

      - name: Audit innerHTML usage
        run: |
          UNKNOWN=$(grep -rn "innerHTML" packages/web/src packages/app/src packages/ui/src \
            --include="*.tsx" --include="*.ts" \
            | grep -v "\.test\.ts:" \
            | grep -v "content-bash.tsx" \
            | grep -v "content-code.tsx" \
            | grep -v "content-markdown.tsx" \
            | grep -v "file-tree.tsx" \
            | grep -v "prompt-input.tsx" \
            | grep -v "settings-general.tsx" \
            | grep -v "settings-remote-access.tsx" \
            | grep -v "ui/src/components/markdown.tsx" \
            | grep -v "ui/src/components/file-ssr.tsx" \
            | grep -v "ui/src/components/icon.tsx" \
            | grep -v "ui/src/components/file.tsx" \
            | grep -v "ui/src/pierre/file-find.ts" \
            || true)
          if [ -n "$UNKNOWN" ]; then
            echo "::error::Unvetted innerHTML usage detected. Audit and add to .eslintrc.restrict.cjs before merging."
            echo "$UNKNOWN"
            exit 1
          fi

      - name: LOC gate (packages/app)
        run: |
          # Gate : aucun fichier TypeScript dans packages/app/src ne doit dépasser 1500 LOC
          # Exceptions documentées : aucune (les fichiers > 1500 sont dans upstream packages)
          GATE=1500
          VIOLATIONS=$(find packages/app/src -name "*.ts" -o -name "*.tsx" | \
            xargs wc -l 2>/dev/null | \
            awk -v t=$GATE '$1 > t && $2 != "total" { print $1, $2 }' | \
            grep -v "node_modules" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ LOC gate FAILED — fichiers > ${GATE} LOC dans packages/app/src :"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ LOC gate passed — aucun fichier packages/app/src > ${GATE} LOC"