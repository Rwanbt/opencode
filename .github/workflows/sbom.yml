name: SBOM

# Manual only (see release-sign.yml for the same rationale): auto-triggering
# on every published release attached 2 SBOM files nobody outside a
# compliance audit needs, cluttering releases meant for end users.

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sbom:
    name: Generate SBOM (SPDX + CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: opencode-sbom.spdx.json
          output-file: opencode-sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: opencode-sbom.cyclonedx.json
          output-file: opencode-sbom.cyclonedx.json
          upload-artifact: true
          upload-release-assets: false
