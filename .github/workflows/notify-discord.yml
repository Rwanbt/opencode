name: notify-discord

on:
  release:
    types: [released] # fires when a draft release is published

jobs:
  notify:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Send release notification to Discord
        env:
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          URL: ${{ github.event.release.html_url }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title  "$TAG" \
            --arg desc   "$NAME" \
            --arg url    "$URL" \
            '{embeds:[{title:$title,description:$desc,url:$url,color:5814783}]}')
          curl -sf -H 'Content-Type: application/json' -d "$PAYLOAD" "$WEBHOOK"
