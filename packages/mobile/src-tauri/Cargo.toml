[package]
name = "opencode-mobile"
version = "0.1.0"
description = "OpenCode Mobile - AI coding agent on your phone"
authors = ["Rwanbt"]
edition = "2021"

[lib]
name = "opencode_mobile_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-http = "2"
tauri-plugin-store = "2"
tauri-plugin-notification = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-os = "2"
tauri-plugin-process = "2"
tauri-plugin-haptics = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-dialog = "2"
# FORK: opens links in the system browser (Custom Tabs on Android) instead of
# the app's embedded WebView — required for GitHub OAuth Device Flow so the
# user authenticates on github.com itself, never inside our WebView.
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

tokio = { version = "1", features = ["time", "rt", "net", "io-util", "macros"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
futures-util = "0.3"

log = "0.4"
opencode-kokoro-shared = { path = "../../../crates/opencode-kokoro-shared" }

[target.'cfg(target_os = "android")'.dependencies]
url = "2"
android_logger = "0.14"
# I9 thermal — JNI bridge to PowerManager.getCurrentThermalStatus()
jni = "0.21"
ndk-context = "0.1"

# STT/TTS engines (cross-platform ONNX Runtime)
# Android: set ORT_LIB_LOCATION to ONNX Runtime AAR extracted .so directory before building.
# download-binaries is needed for API availability; ORT_LIB_LOCATION overrides the download.
[dependencies.ort]
version = "=2.0.0-rc.10"
features = ["download-binaries"]

[dependencies.ndarray]
version = "0.16.1"

[dependencies.hound]
version = "3.5.1"

[dependencies.bincode]
version = "2.0"
features = ["std", "derive"]

[dependencies.zip]
version = "2"
default-features = false
features = ["deflate"]

[dependencies.tracing]
version = "0.1"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-window-state = "2"

[dev-dependencies]
# url is normally android-only, but needed by validate_url which is compiled
# under cfg(any(target_os = "android", test)) for unit tests on host machines.
url = "2"
