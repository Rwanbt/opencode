<!doctype html>
<html lang="en" style="background-color: var(--background-base)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>OpenCode</title>
    <link rel="icon" type="image/png" href="/favicon-96x96-v3.png" sizes="96x96" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v3.png" />
    <meta name="theme-color" content="#F8F7F7" />
    <meta name="theme-color" content="#131010" media="(prefers-color-scheme: dark)" />
    <script id="oc-theme-preload-script" src="/oc-theme-preload.js"></script>
    <style>
      /* Safe area insets for notch/home indicator */
      :root {
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
      }
      body {
        margin: 0;
        padding: 0;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        overflow: hidden;
        height: 100dvh;
        width: 100dvw;
      }
      /* Apply safe area as padding inside the root container */
      #root {
        padding-top: var(--safe-area-top);
        padding-bottom: var(--safe-area-bottom);
        padding-left: var(--safe-area-left);
        padding-right: var(--safe-area-right);
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="antialiased overscroll-none text-12-regular">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="loading" style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#ff0000;color:#ffffff;font-family:sans-serif;font-size:24px;font-weight:bold;z-index:9999">OPENCODE LOADING - IF YOU SEE THIS, HTML WORKS</div>
    <div id="root" class="flex flex-col h-dvh"></div>
    <script src="/src/entry.tsx" type="module"></script>
  </body>
</html>
