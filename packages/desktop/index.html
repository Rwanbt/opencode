<!doctype html>
<html lang="en" style="background-color: var(--background-base)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCode</title>
    <link rel="icon" type="image/png" href="/favicon-96x96-v3.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon-v3.svg" />
    <link rel="shortcut icon" href="/favicon-v3.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v3.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#F8F7F7" />
    <meta name="theme-color" content="#131010" media="(prefers-color-scheme: dark)" />
    <meta property="og:image" content="/social-share.png" />
    <meta property="twitter:image" content="/social-share.png" />
    <script>
      // Silence tauri-plugin-decorum 1.1.1 observer noise: plugin never disconnects its MutationObserver
      // so these two messages fire on every DOM mutation. Filter before its scripts run.
      (function () {
        var log = console.log
        var noise = /^DECORUM: (Controls already exist|Waiting for \[data-tauri-decorum-tb\]|Element with data-tauri-decorum-tb not found)/
        console.log = function () {
          if (arguments.length && typeof arguments[0] === "string" && noise.test(arguments[0])) return
          return log.apply(console, arguments)
        }
      })()
    </script>
    <script id="oc-theme-preload-script" src="/oc-theme-preload.js"></script>
  </head>
  <body class="antialiased overscroll-none text-12-regular overflow-hidden">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" class="flex flex-col h-dvh"></div>
    <div data-tauri-decorum-tb class="w-0 h-0 hidden" />
    <script src="/src/entry.tsx" type="module"></script>
  </body>
</html>
